variables:
  PRODUCT_NAME: atlasprint

stages:
- lint
- test
- build
- deploy
- release


# ------------
# Lint
# ------------
lint:
  image: ${REGISTRY_URL}/factory-ci-runner:qgis-${QGIS_FLAVOR}
  tags:
    - factory-plain
  stage: lint
  script:
    - make lint
  parallel:
    matrix:
      - QGIS_FLAVOR: ["ltr", "release"]
 
# ------------
# Tests
# ------------

.tests:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  tags:
    - factory-dind
  stage: test
  script:
    - make docker-test QGIS_VERSION=$QGIS_FLAVOR

qgis-tests:
  extends: .tests
  parallel:
    matrix:
      - QGIS_FLAVOR: [
        "3.34",
        "3.40",
        "3.44",
        "4.0"
      ]


# NOTE: Following jobs are triggered only on RELEASE_BRANCH == "true"

# 
# Packages 
#

.release_rules:
  if: '$CI_COMMIT_TAG =~ /^(?:release-|v)?\d+\.\d+\.\d+(?:-.*)?$/'

build:
  image: $REGISTRY_URI/factory-ci-runner:qgis-plugin-ci
  stage: build
  tags:
    - factory-plain
  rules:
    - if: !reference [.release_rules, if]
      variables:
        PRERELEASE: ""
    - if: $RELEASE_BRANCH == "true"
      variables:
        PRERELEASE: "--pre"
  script:
      - yapt-pkg package $PRERELEASE
      - echo "PACKAGE=`ls -1 *.zip`" > build.env
      - cat build.env
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - "*.zip"


deploy:
  image: $REGISTRY_URI/factory-ci-runner:fabric-ci
  stage: deploy 
  tags:
    - fabric
  rules:
    - !reference [.release_rules]
    - if: $RELEASE_BRANCH == "true"
  dependencies:
    - build
  script:
    - upload_plugins ${PRODUCT_NAME} ${PACKAGE}
    - update-snap-qgis-plugins

#
# Release
#

# XXX Deprecate ci-tools and adapts scripts to qgis-plugin-ci runner

release:
  image:
    name: $REGISTRY_URI/infra/ci-tools:latest
  tags:
    - factory-plain
  stage: release
  rules:
    - !reference [.release_rules]
  script:
    - create_ticket.py
    - gitlab_release

